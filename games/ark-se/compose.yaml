# ARK: Survival Evolved — hub.docker.com/r/hermsi/ark-server
# Full env reference: https://github.com/Hermsi1337/docker-ark-server
# Server settings (difficulty, rates) + config workflow: see games/ark-se/README.md
#
#   ./ctl up ark-se
#
services:
  ark:
    image: hermsi/ark-server:latest
    container_name: ark-server
    restart: unless-stopped
    stop_grace_period: 90s          # ARK needs time to saveworld on shutdown
    # NOTE: no-new-privileges is intentionally OMITTED here — this image's boot runs
    # the setgid `crontab` binary as the steam user, and no-new-privileges neuters
    # setgid → crontab fails (mkstemp: Permission denied) and the server crash-loops.
    # Other hardening stays (non-root steam user, pids cap).
    # ARK's Linux server HANGS at "Setting breakpad minidump" if the open-files limit
    # is too low (Docker default soft=1024); the server needs ~100k to finish loading.
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    # HOST networking (no `ports:` block in this mode). Docker's bridge userland UDP
    # proxy mangles the response source-port for REMOTE clients, so the Steam query
    # and game connects fail from any other machine (work only locally). Host mode
    # binds ARK directly on the host NIC and fixes that. Ports: 7777/udp (game),
    # 27015/udp (query), 27020/tcp (RCON).
    # ⚠ RCON 27020 is NO LONGER localhost-only in host mode — block LAN/WAN access
    #   with UFW (`sudo ufw deny 27020/tcp`); never port-forward it on the router.
    network_mode: host
    environment:
      PUID: "${PUID}"
      PGID: "${PGID}"
      TZ: "${TZ}"
      SESSION_NAME: "${ARK_SESSION_NAME}"
      SERVER_MAP: "${ARK_MAP}"
      SERVER_PASSWORD: "${SERVER_PASSWORD}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      MAX_PLAYERS: "${ARK_MAX_PLAYERS}"
      # Steam Workshop mod IDs (comma-separated); the server downloads them on boot:
      GAME_MOD_IDS: "${ARK_MODS}"
      UPDATE_ON_START: "true"
    volumes:
      # Image's NATIVE single volume /app: steamcmd + binaries (~22GB), world saves,
      # arkmanager config, AND GameUserSettings.ini / Game.ini all live here.
      # Do NOT override ARK_SERVER_VOLUME: the image bakes ARK_TOOLS_DIR=/app/arkmanager
      # at build time, so an override splits binaries from config and the server won't boot.
      - ./server:/app
    deploy:
      resources:
        limits:
          memory: "${ARK_MEMORY}"
          pids: 512                  # cap process count → defuses fork bombs (raise if the server ever hits it)
