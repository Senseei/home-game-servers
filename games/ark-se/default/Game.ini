; ─────────────────────────────────────────────────────────────────────────────
;  ARK gameplay config — SAMPLE (Game.ini)
;
;  To apply, with the server STOPPED, copy this into the live file (safe to fully
;  replace — the image never writes Game.ini):
;    games/ark-se/server/server/ShooterGame/Saved/Config/LinuxServer/Game.ini
;  then start the server. See games/ark-se/README.md.
; ─────────────────────────────────────────────────────────────────────────────
[/script/shootergame.shootergamemode]
MatingSpeedMultiplier=10.0

; Breeding — fast hatch/grow + easy 100% imprint.
; These MUST be in Game.ini (NOT GameUserSettings.ini) or the engine ignores cuddle/imprint.
MatingIntervalMultiplier=0.05
EggHatchSpeedMultiplier=50.0
BabyMatureSpeedMultiplier=100.0
BabyFoodConsumptionSpeedMultiplier=0.3
BabyCuddleIntervalMultiplier=0.1
BabyImprintAmountMultiplier=10.0          ; ~one cuddle = 100% (growth is fast, little time to cuddle)
BabyCuddleLoseImprintQualitySpeedMultiplier=0.0   ; missed cuddles don't lose imprint quality
KillXPMultiplier=2.0    ; double XP from kills (stacks on the global XPMultiplier)
bAllowFlyerSpeedLeveling=True              ; level Movement Speed on flyers (Game.ini only, needs the 'b')
bDisableStructurePlacementCollision=True   ; place structures overlapping / clip into terrain
bPvEDisableFriendlyFire=True               ; no friendly fire (PvE) — tribe mates/dinos/structures can't hurt each other

; Player per-level stat multipliers (2.5 baseline; Food/Water 5; Oxygen 10; Melee/Speed 3)
PerLevelStatsMultiplier_Player[0]=2.5    ; Health
PerLevelStatsMultiplier_Player[1]=2.5    ; Stamina
PerLevelStatsMultiplier_Player[3]=10.0   ; Oxygen (breathing)
PerLevelStatsMultiplier_Player[4]=5.0    ; Food (hunger)
PerLevelStatsMultiplier_Player[5]=5.0    ; Water (thirst)
PerLevelStatsMultiplier_Player[7]=2.5    ; Weight
PerLevelStatsMultiplier_Player[8]=3.0    ; Melee Damage (strength)
PerLevelStatsMultiplier_Player[9]=3.0    ; Movement Speed
PerLevelStatsMultiplier_Player[10]=2.5   ; Fortitude
PerLevelStatsMultiplier_Player[11]=2.5   ; Crafting Speed

; Tamed dino per-level gains — speed / stamina / weight only
PerLevelStatsMultiplier_DinoTamed_Add[1]=2.0   ; Stamina
PerLevelStatsMultiplier_DinoTamed_Add[7]=2.0   ; Weight
PerLevelStatsMultiplier_DinoTamed_Add[9]=2.0   ; Movement Speed
