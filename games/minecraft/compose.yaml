# Minecraft (CurseForge modpack) — github.com/itzg/docker-minecraft-server
# Full env reference: https://docker-minecraft-server.readthedocs.io
# Setup (API key, picking a pack, client install): see games/minecraft/README.md
#
#   ../../scripts/ctl.sh up minecraft
#
services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: mc
    restart: unless-stopped
    stop_grace_period: 90s          # let the world save on shutdown
    tty: true
    stdin_open: true
    security_opt:
      - no-new-privileges:true       # block privilege escalation inside the container
    pids_limit: 512                  # cap process count → defuses fork bombs (raise if the server ever hits it)
    ports:
      - "25565:25565"               # Java game port (TCP)
      - "127.0.0.1:25575:25575"     # RCON — localhost ONLY, never expose publicly
    environment:
      EULA: "TRUE"
      # CurseForge modpack server (Forge/Fabric). Every player must install the SAME pack.
      TYPE: "AUTO_CURSEFORGE"
      CF_API_KEY: "${CF_API_KEY}"     # free key from console.curseforge.com (see .env)
      CF_PAGE_URL: "${MC_CF_MODPACK}" # modpack page URL or slug; the pack sets the MC version + loader
      MEMORY: "${MC_MEMORY}"          # modpacks are hungry — 4G+ recommended
      USE_AIKAR_FLAGS: "true"        # tuned G1GC flags for Minecraft
      TZ: "${TZ}"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      # Idle the JVM when no players are connected; wakes on connect.
      ENABLE_AUTOPAUSE: "TRUE"
      AUTOPAUSE_TIMEOUT_EST: "600"   # seconds of no players before pausing
      MAX_TICK_TIME: "-1"            # required with autopause on modded: stops the watchdog killing the server on resume
    volumes:
      - ./data:/data                 # world + config + mods live here (AUTO_CURSEFORGE manages ./data/mods)
    healthcheck:
      test: ["CMD", "mc-health"]
      start_period: 2m
      interval: 30s
      retries: 10
